<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lista de Espera — The Brow Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Lato:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #F4F1EA;
    --sand-deep: #EAE4D8;
    --terracotta: #B5704C;
    --terracotta-deep: #9C5B3C;
    --ink: #2E2A26;
    --ink-soft: #6B6258;
    --line: #DCD5C8;
    --amber-bg: #F2E3C9;
    --amber-text: #8A6418;
    --coral-bg: #F3DCD4;
    --coral-text: #A1492E;
    --teal-bg: #DCE7E2;
    --teal-text: #3D6B5C;
    --radius: 10px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--sand);
    color: var(--ink);
    font-family: 'Lato', sans-serif;
    min-height: 100vh;
  }

  .page {
    max-width: 880px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 20px;
  }

  .brand-eyebrow {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--terracotta);
    margin: 0 0 4px;
    font-weight: 600;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 34px;
    margin: 0;
    letter-spacing: 0.01em;
  }

  #sync-indicator {
    font-size: 12px;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--teal-text);
    display: inline-block;
  }
  .dot.loading { background: var(--amber-text); animation: pulse 1.2s infinite; }
  .dot.error { background: var(--coral-text); }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 28px 0 24px;
  }

  .stat-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 18px;
  }

  .stat-label {
    font-size: 12px;
    color: var(--ink-soft);
    margin: 0 0 6px;
  }

  .stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 500;
    margin: 0;
  }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 20px;
  }

  .filters {
    display: flex;
    gap: 8px;
  }

  select {
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    padding: 9px 12px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    color: var(--ink);
  }

  .search-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 15px;
    height: 15px;
    color: var(--ink-soft);
    pointer-events: none;
  }

  #search-input {
    width: 100%;
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    padding: 11px 14px 11px 38px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #fff;
    color: var(--ink);
  }

  #search-input::placeholder { color: var(--ink-soft); }

  button {
    font-family: 'Lato', sans-serif;
    cursor: pointer;
  }

  .btn-primary {
    background: var(--terracotta);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-primary:hover { background: var(--terracotta-deep); }

  .btn-icon {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-soft);
    font-size: 15px;
  }
  .btn-icon:hover { border-color: var(--terracotta); color: var(--terracotta); }

  .btn-text {
    background: none;
    border: none;
    color: var(--ink-soft);
    font-size: 13px;
    text-decoration: underline;
    padding: 4px;
  }

  #list-container { display: flex; flex-direction: column; gap: 10px; }

  .client-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 20px;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .card-left { display: flex; gap: 12px; align-items: flex-start; }

  .position {
    min-width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--sand-deep);
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    margin-top: 2px;
  }

  .client-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    margin: 0;
  }

  .client-proc {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 2px 0 0;
  }

  .status-badge {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 100px;
    white-space: nowrap;
    font-weight: 600;
  }
  .status-vaga { background: var(--amber-bg); color: var(--amber-text); }
  .status-sinal { background: var(--coral-bg); color: var(--coral-text); }
  .status-chamada { background: var(--teal-bg); color: var(--teal-text); }

  .prof-badge {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 100px;
    white-space: nowrap;
    font-weight: 600;
    background: var(--sand-deep);
    color: var(--terracotta-deep);
  }

  .badges-right {
    display: flex;
    gap: 6px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-top: 14px;
    gap: 10px;
    flex-wrap: wrap;
  }

  .card-meta {
    font-size: 13px;
    color: var(--ink-soft);
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .card-actions { display: flex; gap: 6px; }

  .empty-state {
    text-align: center;
    padding: 56px 20px;
    color: var(--ink-soft);
  }
  .empty-state .icon { font-size: 28px; margin-bottom: 8px; }
  .empty-state p { margin: 4px 0; font-size: 14px; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(46, 42, 38, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }

  .modal-box {
    background: var(--sand);
    border-radius: 14px;
    padding: 28px;
    width: 380px;
    max-width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-box h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 18px;
  }

  .field-label {
    font-size: 12px;
    color: var(--ink-soft);
    display: block;
    margin-bottom: 5px;
    font-weight: 600;
  }

  .field-input {
    width: 100%;
    font-family: 'Lato', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
    margin-bottom: 14px;
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 6px;
  }

  .btn-secondary {
    background: none;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 10px 16px;
    font-size: 14px;
    color: var(--ink-soft);
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--sand);
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 560px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .filters { width: 100%; }
    select { flex: 1; }
  }
</style>
</head>
<body>

<div class="page">
  <header>
    <div>
      <p class="brand-eyebrow">The Brow Studio</p>
      <h1>Lista de espera</h1>
    </div>
    <div id="sync-indicator"><span class="dot loading" id="sync-dot"></span><span id="sync-text">Sincronizando…</span></div>
  </header>

  <div class="stats">
    <div class="stat-card">
      <p class="stat-label">Na fila</p>
      <p class="stat-value" id="stat-total">0</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Aguardando vaga</p>
      <p class="stat-value" id="stat-vaga">0</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Aguardando sinal</p>
      <p class="stat-value" id="stat-sinal">0</p>
    </div>
  </div>

  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="search-input" placeholder="Buscar por nome ou telefone…" autocomplete="off" />
  </div>

  <div class="toolbar">
    <div class="filters">
      <select id="filter-status">
        <option value="todos">Todos os status</option>
        <option value="vaga">Aguardando vaga</option>
        <option value="sinal">Aguardando sinal</option>
        <option value="chamada">Cliente chamada</option>
      </select>
      <select id="filter-profissional">
        <option value="todas">Todas as profissionais</option>
        <option value="Amanda">Amanda</option>
        <option value="Jéssica">Jéssica</option>
        <option value="Fernanda">Fernanda</option>
        <option value="Julia">Julia</option>
        <option value="Isabelle">Isabelle</option>
        <option value="Sheila">Sheila</option>
        <option value="Sem preferência">Sem preferência</option>
      </select>
      <select id="filter-sort">
        <option value="ordem">Ordem de chegada</option>
        <option value="nome">Nome (A-Z)</option>
      </select>
    </div>
    <button class="btn-primary" id="btn-add">+ Adicionar cliente</button>
  </div>

  <div id="list-container"></div>

  <div class="empty-state" id="empty-state" style="display:none;">
    <div class="icon">○</div>
    <p>Nenhuma cliente na lista de espera ainda.</p>
    <p>Clique em "Adicionar cliente" para começar.</p>
  </div>

  <p style="margin-top:32px;"><button class="btn-text" id="btn-refresh">Atualizar lista agora</button></p>
</div>

<div id="modal-root"></div>
<div class="toast" id="toast"></div>

<script>
(function(){
  // === CONFIGURAÇÃO ===
  var API_URL = 'https://script.google.com/macros/s/AKfycbzRng51M98E16HrmNjPJJJbNs887G-V0lf9ztk5L1NAZ-Z7O6qhkk4QyI9qFbQMEqA/exec';
  var POLL_INTERVAL_MS = 8000; // verifica atualizações a cada 8 segundos

  var clients = [];
  var pollTimer = null;

  function escapeHtml(s){
    return String(s || '').replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  function formatPhoneLink(phone){
    var digits = String(phone || '').replace(/\D/g,'');
    if(!digits) return '';
    if(digits.length <= 11 && !digits.startsWith('55')) digits = '55' + digits;
    return 'https://wa.me/' + digits;
  }

  function showToast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2200);
  }

  function setSyncState(state, label){
    var dot = document.getElementById('sync-dot');
    var text = document.getElementById('sync-text');
    dot.className = 'dot ' + (state === 'ok' ? '' : state);
    text.textContent = label;
  }

  function apiCall(params){
    var url = API_URL + '?' + Object.keys(params).map(function(k){
      return encodeURIComponent(k) + '=' + encodeURIComponent(params[k] === undefined ? '' : params[k]);
    }).join('&');
    return fetch(url).then(function(res){
      if(!res.ok) throw new Error('Erro de rede');
      return res.json();
    });
  }

  function loadClients(silent){
    if(!silent) setSyncState('loading', 'Sincronizando…');
    return apiCall({ action: 'list' }).then(function(data){
      clients = data.clients || [];
      setSyncState('ok', 'Sincronizado');
      render();
    }).catch(function(err){
      setSyncState('error', 'Falha ao sincronizar');
      console.error(err);
    });
  }

  function render(){
    var filterStatus = document.getElementById('filter-status').value;
    var filterProfissional = document.getElementById('filter-profissional').value;
    var sortMode = document.getElementById('filter-sort').value;
    var searchTerm = document.getElementById('search-input').value.trim().toLowerCase();
    var searchDigits = searchTerm.replace(/\D/g,'');

    var visible = clients.filter(function(c){
      var statusOk = filterStatus === 'todos' || c.status === filterStatus;
      var profOk = filterProfissional === 'todas' || (c.profissional || 'Sem preferência') === filterProfissional;

      var searchOk = true;
      if(searchTerm){
        var nomeMatch = String(c.nome || '').toLowerCase().indexOf(searchTerm) !== -1;
        var telDigits = String(c.telefone || '').replace(/\D/g,'');
        var telMatch = searchDigits && telDigits.indexOf(searchDigits) !== -1;
        searchOk = nomeMatch || telMatch;
      }

      return statusOk && profOk && searchOk;
    });

    if(sortMode === 'nome'){
      visible = visible.slice().sort(function(a,b){ return (a.nome||'').localeCompare(b.nome||''); });
    }

    document.getElementById('stat-total').textContent = clients.length;
    document.getElementById('stat-vaga').textContent = clients.filter(function(c){return c.status==='vaga';}).length;
    document.getElementById('stat-sinal').textContent = clients.filter(function(c){return c.status==='sinal';}).length;

    var container = document.getElementById('list-container');
    var empty = document.getElementById('empty-state');

    if(clients.length === 0){
      container.innerHTML = '';
      empty.querySelector('p:nth-child(2)').textContent = 'Nenhuma cliente na lista de espera ainda.';
      empty.querySelector('p:nth-child(3)').textContent = 'Clique em "Adicionar cliente" para começar.';
      empty.style.display = 'block';
      return;
    }

    if(visible.length === 0){
      container.innerHTML = '';
      empty.querySelector('p:nth-child(2)').textContent = 'Nenhuma cliente encontrada.';
      empty.querySelector('p:nth-child(3)').textContent = 'Tente ajustar a busca ou os filtros.';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    var statusLabels = { vaga: 'Aguardando vaga', sinal: 'Aguardando sinal', chamada: 'Cliente chamada' };

    container.innerHTML = visible.map(function(c, idx){
      var waLink = formatPhoneLink(c.telefone);
      var posicao = sortMode === 'ordem' ? (idx + 1) : null;
      var statusClass = 'status-' + (c.status || 'vaga');
      var statusLabel = statusLabels[c.status] || 'Aguardando vaga';
      var profLabel = c.profissional || 'Sem preferência';

      return '' +
      '<div class="client-card">' +
        '<div class="card-top">' +
          '<div class="card-left">' +
            (posicao ? '<div class="position">'+posicao+'</div>' : '') +
            '<div>' +
              '<p class="client-name">'+escapeHtml(c.nome)+'</p>' +
              '<p class="client-proc">'+escapeHtml(c.procedimento || 'Procedimento não informado')+'</p>' +
            '</div>' +
          '</div>' +
          '<div class="badges-right">' +
            '<span class="prof-badge">'+escapeHtml(profLabel)+'</span>' +
            '<span class="status-badge '+statusClass+'">'+statusLabel+'</span>' +
          '</div>' +
        '</div>' +
        '<div class="card-bottom">' +
          '<div class="card-meta">' +
            (c.telefone ? '<span>'+escapeHtml(c.telefone)+'</span>' : '') +
            (c.preferencia ? '<span>Prefere: '+escapeHtml(c.preferencia)+'</span>' : '') +
            (c.observacao ? '<span>'+escapeHtml(c.observacao)+'</span>' : '') +
          '</div>' +
          '<div class="card-actions">' +
            (waLink ? '<a class="btn-icon" href="'+waLink+'" target="_blank" rel="noopener" title="Chamar no WhatsApp">↗</a>' : '') +
            '<button class="btn-icon btn-edit" data-id="'+c.id+'" title="Editar">✎</button>' +
            '<button class="btn-icon btn-remove" data-id="'+c.id+'" title="Remover">×</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');

    container.querySelectorAll('.btn-edit').forEach(function(btn){
      btn.addEventListener('click', function(){ openModal(btn.dataset.id); });
    });
    container.querySelectorAll('.btn-remove').forEach(function(btn){
      btn.addEventListener('click', function(){
        if(!confirm('Remover esta cliente da lista de espera?')) return;
        setSyncState('loading', 'Removendo…');
        apiCall({ action: 'delete', id: btn.dataset.id }).then(function(){
          showToast('Cliente removida');
          loadClients(true);
        }).catch(function(){
          setSyncState('error', 'Falha ao remover');
        });
      });
    });
  }

  function openModal(editId){
    var existing = editId ? clients.find(function(c){ return String(c.id) === String(editId); }) : null;
    var root = document.getElementById('modal-root');

    root.innerHTML = '' +
    '<div class="modal-overlay">' +
      '<div class="modal-box">' +
        '<h2>'+(existing ? 'Editar cliente' : 'Nova cliente na lista')+'</h2>' +

        '<label class="field-label">Nome</label>' +
        '<input id="m-nome" class="field-input" type="text" placeholder="Nome da cliente" value="'+escapeHtml(existing ? existing.nome : '')+'" />' +

        '<label class="field-label">Telefone (WhatsApp)</label>' +
        '<input id="m-telefone" class="field-input" type="text" placeholder="(11) 90000-0000" value="'+escapeHtml(existing ? existing.telefone : '')+'" />' +

        '<label class="field-label">Procedimento desejado</label>' +
        '<input id="m-procedimento" class="field-input" type="text" placeholder="Ex: Nanopigmentação" value="'+escapeHtml(existing ? existing.procedimento : '')+'" />' +

        '<label class="field-label">Profissional preferida</label>' +
        '<select id="m-profissional" class="field-input">' +
          ['Sem preferência','Amanda','Jéssica','Fernanda','Julia','Isabelle','Sheila'].map(function(nome){
            var sel = existing && existing.profissional === nome ? ' selected' : (!existing && nome === 'Sem preferência' ? ' selected' : '');
            return '<option value="'+nome+'"'+sel+'>'+nome+'</option>';
          }).join('') +
        '</select>' +

        '<label class="field-label">Status</label>' +
        '<select id="m-status" class="field-input">' +
          '<option value="vaga"'+(existing && existing.status==='vaga' ? ' selected' : '')+'>Aguardando vaga</option>' +
          '<option value="sinal"'+(existing && existing.status==='sinal' ? ' selected' : '')+'>Aguardando sinal</option>' +
          '<option value="chamada"'+(existing && existing.status==='chamada' ? ' selected' : '')+'>Cliente chamada</option>' +
        '</select>' +

        '<label class="field-label">Preferência de horário</label>' +
        '<input id="m-preferencia" class="field-input" type="text" placeholder="Ex: só sexta à tarde" value="'+escapeHtml(existing ? existing.preferencia : '')+'" />' +

        '<label class="field-label">Observação</label>' +
        '<input id="m-observacao" class="field-input" type="text" placeholder="Ex: já fez avaliação" value="'+escapeHtml(existing ? existing.observacao : '')+'" />' +

        '<div class="modal-actions">' +
          '<button class="btn-secondary" id="m-cancel">Cancelar</button>' +
          '<button class="btn-primary" id="m-save">Salvar</button>' +
        '</div>' +
      '</div>' +
    '</div>';

    document.getElementById('m-cancel').addEventListener('click', function(){ root.innerHTML = ''; });

    document.getElementById('m-save').addEventListener('click', function(){
      var nome = document.getElementById('m-nome').value.trim();
      if(!nome){ alert('Por favor, preencha o nome da cliente.'); return; }

      var data = {
        nome: nome,
        telefone: document.getElementById('m-telefone').value.trim(),
        procedimento: document.getElementById('m-procedimento').value.trim(),
        profissional: document.getElementById('m-profissional').value,
        status: document.getElementById('m-status').value,
        preferencia: document.getElementById('m-preferencia').value.trim(),
        observacao: document.getElementById('m-observacao').value.trim()
      };

      var saveBtn = document.getElementById('m-save');
      saveBtn.textContent = 'Salvando…';
      saveBtn.disabled = true;

      var action = existing ? Object.assign({ action: 'update', id: existing.id }, data) : Object.assign({ action: 'add' }, data);

      apiCall(action).then(function(res){
        if(res.error){ alert(res.error); saveBtn.textContent = 'Salvar'; saveBtn.disabled = false; return; }
        root.innerHTML = '';
        showToast(existing ? 'Cliente atualizada' : 'Cliente adicionada');
        loadClients(true);
      }).catch(function(){
        alert('Não foi possível salvar. Verifique sua conexão e tente novamente.');
        saveBtn.textContent = 'Salvar';
        saveBtn.disabled = false;
      });
    });
  }

  document.getElementById('btn-add').addEventListener('click', function(){ openModal(null); });
  document.getElementById('filter-status').addEventListener('change', render);
  document.getElementById('filter-profissional').addEventListener('change', render);
  document.getElementById('filter-sort').addEventListener('change', render);
  document.getElementById('search-input').addEventListener('input', render);
  document.getElementById('btn-refresh').addEventListener('click', function(){ loadClients(false); });

  loadClients(false);
  pollTimer = setInterval(function(){ loadClients(true); }, POLL_INTERVAL_MS);
})();
</script>
